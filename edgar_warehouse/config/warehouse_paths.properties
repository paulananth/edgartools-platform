# Reference snapshots
reference.company_tickers.path = reference/sec/company_tickers/{date_path}/company_tickers.json
reference.company_tickers_exchange.path = reference/sec/company_tickers_exchange/{date_path}/company_tickers_exchange.json
reference.cik_universe_batches.path = reference/cik_universe/runs/{run_id}/cik_batches.jsonl

# Bronze capture filenames and paths
submissions.main.filename = CIK{cik:010d}.json
submissions.main.path = submissions/sec/cik={cik}/main/{date_path}/{document_name}
submissions.pagination.path = submissions/sec/cik={cik}/pagination/{date_path}/{document_name}
daily_index.filename = form.{business_date}.idx
daily_index.path = daily_index/sec/{date_path}/{document_name}

# Filing artifacts and extracted text
filings.index.filename = {accession_number}-index.html
filings.index.path = filings/sec/cik={cik}/accession={accession_number}/index/{document_name}
filings.document.path = filings/sec/cik={cik}/accession={accession_number}/{section}/{document_name}
text.filename = {text_version}.txt
text.path = text/sec/cik={cik}/accession={accession_number}/{document_name}

# Run manifests
manifest.default.bronze.path = runs/{command_path}/{run_id}/manifest.json
manifest.default.staging.path = staging/runs/{command_path}/{run_id}/manifest.json
manifest.default.silver.path = silver/sec/runs/{command_path}/{run_id}/manifest.json
manifest.default.gold.path = gold/runs/{command_path}/{run_id}/manifest.json
manifest.default.artifacts.path = artifacts/runs/{command_path}/{run_id}/manifest.json
manifest.load_daily_form_index_for_date.bronze.path = daily-index/date={business_date}/{run_id}/manifest.json
manifest.load_daily_form_index_for_date.staging.path = staging/daily-index/date={business_date}/{run_id}/manifest.json
manifest.catch_up_daily_form_index.bronze.path = daily-index/catch-up/end-date={end_date}/{run_id}/manifest.json
manifest.catch_up_daily_form_index.staging.path = staging/daily-index/catch-up/end-date={end_date}/{run_id}/manifest.json

# Gold and Snowflake export outputs
gold.table.filename = {table_name}.parquet
gold.table.path = gold/{table_name}/run_id={run_id}/{document_name}
snowflake_export.table.filename = {table_path}.parquet
snowflake_export.table.path = {table_path}/business_date={business_date}/run_id={run_id}/{document_name}
snowflake_export.run_manifest.path = manifests/workflow_name={workflow_name}/business_date={business_date}/run_id={run_id}/run_manifest.json

