name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag override (default: short SHA)"
        default: ""

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT: "077127448006"

jobs:
  # ── Build and push container images to ECR ─────────────────────────────────
  build-push:
    name: Build ${{ matrix.role }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - role: warehouse
            ecr_repository: edgartools-dev-warehouse
          - role: mdm
            ecr_repository: edgartools-dev-mdm

    outputs:
      warehouse-image: ${{ steps.meta.outputs.image-ref }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT }}:role/edgartools-dev-github-actions-ecr
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image tag
        id: tag
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push ${{ matrix.role }}
        id: meta
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          bash infra/scripts/publish-warehouse-image.sh \
            --aws-region "$AWS_REGION" \
            --ecr-repository "${{ matrix.ecr_repository }}" \
            --role "${{ matrix.role }}" \
            --image-tag "$TAG" \
            --mode buildx \
            --cache-tag buildcache \
            --also-tag dev
          echo "image-ref=${{ env.AWS_ACCOUNT }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ matrix.ecr_repository }}:${TAG}" >> "$GITHUB_OUTPUT"
