name: Smoke test

on:
  workflow_run:
    workflows: ["Deploy"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      cik:
        description: "CIK to test (default: 320193 - Apple)"
        default: "320193"
      env:
        description: "Environment"
        default: "dev"
        type: choice
        options: [dev, prod]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT: "077127448006"

jobs:
  smoke:
    name: CIK ${{ github.event.inputs.cik || '320193' }} (${{ github.event.inputs.env || 'dev' }})
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT }}:role/edgartools-dev-github-actions-ecr
          aws-region: ${{ env.AWS_REGION }}

      - name: Install snow CLI
        run: pip install snowflake-cli-labs --quiet

      - name: Configure snow connection
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          : "${SNOWFLAKE_ACCOUNT:?SNOWFLAKE_ACCOUNT secret is required}"
          : "${SNOWFLAKE_USER:?SNOWFLAKE_USER secret is required}"
          : "${SNOWFLAKE_PASSWORD:?SNOWFLAKE_PASSWORD secret is required}"
          mkdir -p ~/.snowflake
          cat > ~/.snowflake/config.toml <<EOF
          default_connection_name = "edgartools-dev"
          EOF

          cat > ~/.snowflake/connections.toml <<EOF
          [edgartools-dev]
          account = "${SNOWFLAKE_ACCOUNT}"
          user = "${SNOWFLAKE_USER}"
          password = "${SNOWFLAKE_PASSWORD}"
          warehouse = "compute_wh"
          role = "accountadmin"
          EOF
          chmod 0600 ~/.snowflake/config.toml ~/.snowflake/connections.toml

      - name: Validate snow connection
        run: |
          snow sql --connection edgartools-dev --format json --query "SELECT 1 AS ok" > /tmp/snow-connection-check.json
          python3 - <<'PY'
          import json
          rows = json.load(open("/tmp/snow-connection-check.json", encoding="utf-8"))
          if not rows:
              raise SystemExit("snow connection check returned no rows")
          PY

      - name: Run single-CIK smoke test
        env:
          SMOKE_TEST_CIK: ${{ github.event.inputs.cik || '320193' }}
          SMOKE_TEST_ENV: ${{ github.event.inputs.env || 'dev' }}
          SNOW_CONNECTION: edgartools-dev
        run: |
          bash scripts/test/smoke-test-single-cik.sh \
            --cik "$SMOKE_TEST_CIK" \
            --env "$SMOKE_TEST_ENV" \
            --aws-region "$AWS_REGION" \
            --snow-connection "$SNOW_CONNECTION" \
            --timeout 1200

      - name: Collect logs on failure
        if: failure()
        run: |
          aws logs tail /aws/states/edgartools-dev-warehouse \
            --since 35m --region "$AWS_REGION" \
            > /tmp/warehouse-logs.txt 2>&1 || true
          aws logs tail /aws/states/edgartools-dev-mdm \
            --since 35m --region "$AWS_REGION" \
            >> /tmp/warehouse-logs.txt 2>&1 || true

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-test-logs
          path: /tmp/warehouse-logs.txt
          retention-days: 7
