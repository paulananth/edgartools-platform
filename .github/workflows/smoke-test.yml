name: Single-CIK smoke test

on:
  workflow_run:
    workflows: ["Build, test, and push container images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      cik:
        description: "CIK to test (default: 320193 — Apple)"
        default: "320193"
      env:
        description: "Environment"
        default: "dev"
        type: choice
        options: [dev, prod]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT: "077127448006"

jobs:
  # Only run the smoke test when the build workflow succeeded (not on failure/cancel).
  check-trigger:
    name: Check trigger condition
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.workflow_run.conclusion }}" == "success" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Upstream workflow did not succeed — skipping smoke test."
          fi

  smoke-test:
    name: Smoke test CIK ${{ github.event.inputs.cik || '320193' }}
    runs-on: ubuntu-latest
    needs: check-trigger
    if: needs.check-trigger.outputs.should_run == 'true'
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT }}:role/edgartools-dev-github-actions-ecr
          aws-region: ${{ env.AWS_REGION }}

      - name: Install snow CLI
        run: pip install snowflake-cli-labs --quiet

      - name: Configure snow connection
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          mkdir -p ~/.snowflake
          cat > ~/.snowflake/config.toml <<EOF
          default_connection_name = "edgartools-dev"

          [connections.edgartools-dev]
          account = "${SNOWFLAKE_ACCOUNT}"
          user = "${SNOWFLAKE_USER}"
          password = "${SNOWFLAKE_PASSWORD}"
          warehouse = "compute_wh"
          role = "accountadmin"
          EOF

      - name: Run single-CIK smoke test
        env:
          SMOKE_TEST_CIK: ${{ github.event.inputs.cik || '320193' }}
          SMOKE_TEST_ENV: ${{ github.event.inputs.env || 'dev' }}
          SNOW_CONNECTION: edgartools-dev
        run: |
          bash scripts/test/smoke-test-single-cik.sh \
            --cik "$SMOKE_TEST_CIK" \
            --env "$SMOKE_TEST_ENV" \
            --aws-region "$AWS_REGION" \
            --snow-connection "$SNOW_CONNECTION" \
            --timeout 1200

      - name: Upload smoke test logs on failure
        if: failure()
        run: |
          aws logs tail /aws/states/edgartools-dev-warehouse \
            --since 35m \
            --region "$AWS_REGION" \
            > /tmp/warehouse-logs.txt 2>&1 || true
          aws logs tail /aws/states/edgartools-dev-mdm \
            --since 35m \
            --region "$AWS_REGION" \
            >> /tmp/warehouse-logs.txt 2>&1 || true

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-test-logs
          path: /tmp/warehouse-logs.txt
          retention-days: 7
