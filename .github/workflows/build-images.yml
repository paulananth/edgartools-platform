name: Build, test, and push container images

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag override (default: dev)"
        default: dev

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT: "077127448006"

jobs:
  test:
    name: Run MDM tracking tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install project dependencies (mdm extras for MDM tracking tests)
        run: uv sync --extra mdm

      - name: Run MDM tracking tests
        run: uv run pytest tests/application/test_warehouse_orchestrator_mdm.py -v

  build-push:
    name: Build and push ${{ matrix.role }}
    runs-on: ubuntu-latest
    needs: test

    strategy:
      matrix:
        include:
          - role: warehouse
            ecr_repository: edgartools-dev-warehouse
          - role: mdm
            ecr_repository: edgartools-dev-mdm

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT }}:role/edgartools-dev-github-actions-ecr
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push ${{ matrix.role }}
        run: |
          TAG="${{ github.event.inputs.tag || 'dev' }}"
          bash infra/scripts/publish-warehouse-image.sh \
            --aws-region "$AWS_REGION" \
            --ecr-repository "${{ matrix.ecr_repository }}" \
            --role "${{ matrix.role }}" \
            --image-tag "$TAG" \
            --mode buildx \
            --cache-tag buildcache \
            --also-tag dev
