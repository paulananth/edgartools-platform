name: Build and push container images

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag override (default: dev)"
        default: dev

permissions:
  id-token: write
  contents: read

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        role: [pipelines, mdm-neo4j]
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name edgdev7659acr

      - name: Build and push ${{ matrix.role }}
        run: |
          TAG="${{ github.event.inputs.tag || 'dev' }}"
          bash infra/scripts/publish-warehouse-image-acr.sh \
            --acr-name edgdev7659acr \
            --image-role "${{ matrix.role }}" \
            --image-tag "$TAG"
