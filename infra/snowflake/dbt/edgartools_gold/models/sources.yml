version: 2

sources:
  - name: edgartools_source
    database: "{{ env_var('DBT_SOURCE_CATALOG', env_var('DBT_DATABRICKS_CATALOG', env_var('DBT_SNOWFLAKE_DATABASE', 'EDGARTOOLS_DEV'))) }}"
    schema: "{{ env_var('DBT_SOURCE_SCHEMA', 'EDGARTOOLS_SOURCE') }}"
    tables:
      - name: COMPANY
        description: Current company source table loaded from serving Parquet exports.
      - name: FILING_ACTIVITY
        description: Current filing-activity source table loaded from serving Parquet exports.
      - name: OWNERSHIP_ACTIVITY
        description: Current ownership-activity source table loaded from serving Parquet exports.
      - name: OWNERSHIP_HOLDINGS
        description: Current ownership-holdings source table loaded from serving Parquet exports.
      - name: ADVISER_OFFICES
        description: Current adviser-office source table loaded from serving Parquet exports.
      - name: ADVISER_DISCLOSURES
        description: Current adviser-disclosure source table loaded from serving Parquet exports.
      - name: PRIVATE_FUNDS
        description: Current private-fund source table loaded from serving Parquet exports.
      - name: FILING_DETAIL
        description: Current filing-detail source table loaded from serving Parquet exports.
      - name: TICKER_REFERENCE
        description: CIK-to-ticker reference table loaded from serving Parquet exports.
      - name: SERVING_REFRESH_STATUS
        identifier: "{{ env_var('DBT_REFRESH_STATUS_IDENTIFIER', 'SNOWFLAKE_REFRESH_STATUS') }}"
        description: Per-run serving load and refresh status table for the active warehouse target.
      # ── Fundamentals silver exports (Branch B, isolated DAG branch) ──────────
      # These sources are populated by bootstrap-fundamentals → gold-refresh.
      # A missing/empty source must NOT block the existing 9-table gold chain refresh.
      - name: SEC_FINANCIAL_FACT
        description: XBRL financial facts per (cik, accession, concept, fiscal_period).
      - name: SEC_FINANCIAL_DERIVED
        description: Derived metrics per (cik, accession, fiscal_period) — EBITDA, FCF, margins, returns, forensic scores.
      - name: SEC_EARNINGS_RELEASE
        description: 8-K earnings releases — GAAP/non-GAAP results, guidance, beat/miss flags.
      - name: SEC_ACCOUNTING_FLAG
        description: Annual auditor identity + forensic scores (Beneish, Altman, Piotroski) per 10-K.
      - name: SEC_EXECUTIVE_RECORD
        description: DEF 14A proxy compensation table — exec name, role, total comp per fiscal year.
      - name: SEC_THIRTEENF_HOLDING
        description: 13F-HR institutional holdings — CUSIP, shares held, market value per quarter.
