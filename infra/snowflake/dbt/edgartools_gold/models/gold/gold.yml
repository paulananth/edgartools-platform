  # ── Fundamentals models (isolated DAG branch, Branch B silver) ────────────
  # These models use separate source() blocks and zero ref() into the existing
  # 9-table chain.  A failed fundamentals model must not block existing refresh.
  - name: financial_facts
    description: XBRL financial facts per (cik, accession_number, concept, fiscal_period, segment, period_end, period_start). Dynamic table from SEC_FINANCIAL_FACT silver export.
    columns:
      - name: cik
        tests:
          - not_null
      - name: accession_number
        tests:
          - not_null
      - name: concept
        tests:
          - not_null

  - name: financial_derived
    description: Derived financial metrics with YoY growth per (cik, accession_number, fiscal_period, period_end). Computed from SEC_FINANCIAL_DERIVED silver export.
    columns:
      - name: cik
        tests:
          - not_null
      - name: accession_number
        tests:
          - not_null

  - name: financial_factors
    description: Accounting-only fundamental factors per (cik, accession_number, fiscal_period, period_end). Excludes price, market cap, and market-derived ratios.
    columns:
      - name: cik
        tests:
          - not_null
      - name: accession_number
        tests:
          - not_null
      - name: fiscal_period
        tests:
          - not_null
      - name: roic
        description: >
          Simplified pre-tax ROIC (EBIT / Average Invested Capital). Does not apply
          a NOPAT tax adjustment — financials_derived.py has no parsed
          income_tax_expense/effective-tax-rate field today (see
          edgar_warehouse/parsers/financials_derived.py line 279).
      - name: revenue_cagr_3y
        description: >
          3-year compound annual growth rate of revenue: (revenue_t / revenue_{t-3})^(1/3) - 1.
          FY-only (D-01): null for all non-FY fiscal_period rows (Q1–Q4).
          Strict-positivity null guard (D-02): null when either endpoint (current or
          3-years-prior revenue) is zero or negative, including the negative-to-negative
          case, to avoid misleading positive growth rates for still-unprofitable companies.
          Exact-N-year-match required (D-03, GROW-03): requires a FY row at exactly
          fiscal_year - 3; a gap or fiscal-year shift yields null rather than a
          fuzzy-matched span.
      - name: net_income_cagr_3y
        description: >
          3-year compound annual growth rate of net income: (net_income_t / net_income_{t-3})^(1/3) - 1.
          FY-only (D-01): null for all non-FY fiscal_period rows (Q1–Q4).
          Strict-positivity null guard (D-02): null when either endpoint (current or
          3-years-prior net income) is zero or negative, including the negative-to-negative
          case, to avoid misleading positive growth rates for still-unprofitable companies.
          Exact-N-year-match required (D-03, GROW-03): requires a FY row at exactly
          fiscal_year - 3; a gap or fiscal-year shift yields null rather than a
          fuzzy-matched span.
      - name: total_assets_cagr_3y
        description: >
          3-year compound annual growth rate of total assets: (total_assets_t / total_assets_{t-3})^(1/3) - 1.
          FY-only (D-01): null for all non-FY fiscal_period rows (Q1–Q4).
          Strict-positivity null guard (D-02): null when either endpoint (current or
          3-years-prior total assets) is zero or negative, including the negative-to-negative
          case, to avoid misleading positive growth rates.
          Exact-N-year-match required (D-03, GROW-03): requires a FY row at exactly
          fiscal_year - 3; a gap or fiscal-year shift yields null rather than a
          fuzzy-matched span.
      - name: revenue_cagr_5y
        description: >
          5-year compound annual growth rate of revenue: (revenue_t / revenue_{t-5})^(1/5) - 1.
          FY-only (D-01): null for all non-FY fiscal_period rows (Q1–Q4).
          Strict-positivity null guard (D-02): null when either endpoint (current or
          5-years-prior revenue) is zero or negative, including the negative-to-negative
          case, to avoid misleading positive growth rates for still-unprofitable companies.
          Exact-N-year-match required (D-03, GROW-03): requires a FY row at exactly
          fiscal_year - 5; a gap or fiscal-year shift yields null rather than a
          fuzzy-matched span.
      - name: net_income_cagr_5y
        description: >
          5-year compound annual growth rate of net income: (net_income_t / net_income_{t-5})^(1/5) - 1.
          FY-only (D-01): null for all non-FY fiscal_period rows (Q1–Q4).
          Strict-positivity null guard (D-02): null when either endpoint (current or
          5-years-prior net income) is zero or negative, including the negative-to-negative
          case, to avoid misleading positive growth rates for still-unprofitable companies.
          Exact-N-year-match required (D-03, GROW-03): requires a FY row at exactly
          fiscal_year - 5; a gap or fiscal-year shift yields null rather than a
          fuzzy-matched span.
      - name: total_assets_cagr_5y
        description: >
          5-year compound annual growth rate of total assets: (total_assets_t / total_assets_{t-5})^(1/5) - 1.
          FY-only (D-01): null for all non-FY fiscal_period rows (Q1–Q4).
          Strict-positivity null guard (D-02): null when either endpoint (current or
          5-years-prior total assets) is zero or negative, including the negative-to-negative
          case, to avoid misleading positive growth rates.
          Exact-N-year-match required (D-03, GROW-03): requires a FY row at exactly
          fiscal_year - 5; a gap or fiscal-year shift yields null rather than a
          fuzzy-matched span.

  - name: earnings_releases
    description: 8-K earnings releases with beat/miss flags and cumulative beat streaks per (cik, accession_number).
    columns:
      - name: cik
        tests:
          - not_null
      - name: accession_number
        tests:
          - not_null

  - name: accounting_flags
    description: Annual auditor identity and forensic score tier classifications (Beneish, Altman, Piotroski) per 10-K filing.
    columns:
      - name: cik
        tests:
          - not_null
      - name: accession_number
        tests:
          - not_null

  - name: executive_records
    description: DEF 14A executive compensation with YoY change and tenure metrics per (cik, accession_number, exec_name).
    columns:
      - name: cik
        tests:
          - not_null
      - name: accession_number
        tests:
          - not_null
      - name: exec_name
        tests:
          - not_null

  - name: institutional_holdings
    description: 13F institutional holdings with QoQ share change and ownership rank per (cik, accession_number, holding_index).
    columns:
      - name: cik
        tests:
          - not_null
      - name: accession_number
        tests:
          - not_null
      - name: holding_index
        tests:
          - not_null

  - name: edgartools_gold_status
    description: Business-facing freshness view for the Snowflake gold mirror.
    columns:
      - name: environment
        tests:
          - not_null
      - name: status
        tests:
          - not_null
      - name: updated_at
        tests:
          - not_null
